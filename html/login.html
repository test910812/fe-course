<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 페이지</title>
  <style>
    /* ------------------------------
       기본 리셋
    ------------------------------ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #e9e9e9;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    /* ------------------------------
       전체 카드 박스
       - 이미지처럼 어두운 남색 배경
       - 둥근 모서리
    ------------------------------ */
    .login-wrap {
      width: 100%;
      max-width: 600px;
      min-height: 600px;
      background: #2f3348;
      border-radius: 18px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
    }

    /* ------------------------------
       배경에 사선 패턴 느낌
       - 워터마크 대신 비슷한 장식 효과만 구현
    ------------------------------ */
    .login-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent 0 55px,
          rgba(255, 255, 255, 0.045) 55px 57px,
          transparent 57px 110px
        );
      pointer-events: none;
    }

    /* ------------------------------
       좌상단 작은 원형 로고 느낌
    ------------------------------ */
    .corner-badge {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1f2436;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffb300;
      font-size: 15px;
      z-index: 2;
    }

    /* ------------------------------
       폼 영역
    ------------------------------ */
    .login-box {
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 2;
      text-align: center;
    }

    /* ------------------------------
       프로필 원
    ------------------------------ */
        .avatar {
    width: 120px;
    height: 120px;
    margin: 0 auto 26px;
    border-radius: 50%;
    background: #e9e9e9;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.05);
    }

    .avatar::before {
    content: "";
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #555;
    }

    .avatar::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 8px;
    transform: translateX(-50%);
    width: 78px;
    height: 78px;
    background: #555;
    border-radius: 50% 50% 38% 38%;
    }

    /* ------------------------------
       입력칸 한 줄
       - 왼쪽 아이콘 박스 + 오른쪽 input
    ------------------------------ */
    .input-row {
      display: flex;
      align-items: center;
      width: 100%;
      margin-bottom: 18px;
      background: #fff;
      border: 1px solid #b6b6b6;
      height: 42px;
    }

    .icon-box {
      width: 42px;
      height: 100%;
      border-right: 1px solid #b6b6b6;
      background: #dcdcdc;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #555;
      font-size: 18px;
      flex-shrink: 0;
    }

    .input-row input {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      padding: 0 14px;
      font-size: 16px;
      color: #333;
    }

    .input-row input::placeholder {
      color: #666;
    }

    /* ------------------------------
       하단 옵션 줄
    ------------------------------ */
    .option-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 6px 0 24px;
      font-size: 12px;
      color: #f0f0f0;
      gap: 12px;
    }

    .option-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    .option-row a {
      color: #f0f0f0;
      text-decoration: none;
    }

    .option-row a:hover {
      text-decoration: underline;
    }

    .option-row input[type="checkbox"] {
      accent-color: #ffffff;
      cursor: pointer;
    }

    /* ------------------------------
       로그인 버튼
       - 이미지처럼 오렌지 그라데이션
    ------------------------------ */
    .login-btn {
      width: 132px;
      height: 42px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to bottom, #f8c04a, #d99111);
      color: #fff;
      font-size: 28px;
      font-weight: 500;
      cursor: pointer;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.35),
        0 4px 8px rgba(0, 0, 0, 0.28);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.35),
        0 6px 12px rgba(0, 0, 0, 0.34);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    /* ------------------------------
       모바일 대응
    ------------------------------ */
    @media (max-width: 480px) {
      .login-wrap {
        min-height: 540px;
        padding: 20px;
      }

      .login-box {
        max-width: 100%;
      }

      .option-row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <!-- 좌상단 작은 배지 -->
    <div class="corner-badge">👑</div>

    <!-- 로그인 폼 -->
    <div class="login-box">
      <div class="avatar"></div>

      <form>
        <!-- 아이디 입력 -->
        <div class="input-row">
          <div class="icon-box">✉</div>
          <input type="text" placeholder="Username" />
        </div>

        <!-- 비밀번호 입력 -->
        <div class="input-row">
          <div class="icon-box">🔒</div>
          <input type="password" placeholder="Password" />
        </div>

        <!-- 부가 옵션 -->
        <div class="option-row">
          <label>
            <input type="checkbox" />
            <span>Remember me</span>
          </label>

          <label>
            <input type="checkbox" />
            <a href="#">Forgot your password ?</a>
          </label>
        </div>

        <!-- 버튼 -->
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </div>
</body>
</html>
