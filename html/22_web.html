<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO 기본 -->
  <title>웹 개발 교육 상담 문의 | HTML, CSS, JavaScript, React 과정 안내</title>
  <meta
    name="description"
    content="HTML, CSS, JavaScript, React 프론트엔드 교육 과정 상담 문의 페이지입니다. 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등 궁금한 내용을 남겨주세요."
  />
  <meta
    name="keywords"
    content="웹개발 교육, 프론트엔드 교육, HTML 교육, CSS 교육, JavaScript 교육, React 교육, 웹개발 상담, 프로그래밍 학원 상담"
  />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="웹개발 교육센터" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="웹 개발 교육 상담 문의" />
  <meta
    property="og:description"
    content="HTML, CSS, JavaScript, React 과정 상담 문의 페이지입니다."
  />
  <meta property="og:locale" content="ko_KR" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif;
      background-color: #f3f3f3;
      color: #111;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .page-desc {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .form-box {
      background-color: #fff;
      border: 1px solid #bbb;
      padding: 30px 20px;
    }

    fieldset {
      border: 1px solid #aaa;
      padding: 20px;
    }

    legend {
      font-size: 20px;
      font-weight: 700;
      padding: 0 10px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: inline-block;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .required {
      color: #c00;
    }

    input,
    select,
    textarea {
      width: 100%;
      max-width: 420px;
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #999;
      border-radius: 4px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .help-text {
      margin-top: 8px;
      font-size: 15px;
      color: #444;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group input {
      width: auto;
      max-width: none;
    }

    .submit-btn {
      display: inline-block;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      background-color: #ffffff;
      border: 1px solid #666;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #f0f0f0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body>
  <header class="container">
    <h1 class="page-title">웹 개발 교육 상담 문의</h1>
    <p class="page-desc">
      HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 궁금한 내용을 남겨주세요.
      담당자가 확인 후 안내해드립니다.
    </p>
  </header>

  <main class="container">
    <section class="form-box" aria-labelledby="consult-title">
      <h2 id="consult-title" class="sr-only">상담 신청 폼</h2>

      <form action="#" method="post">
        <fieldset>
          <legend>상담 신청 정보</legend>

          <div class="form-group">
            <label for="name">이름 <span class="required">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="이름을 입력하세요"
              required
            />
            <p class="help-text">실명을 입력해 주세요.</p>
          </div>

          <div class="form-group">
            <label for="email">이메일 <span class="required">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="example@email.com"
              required
            />
            <p class="help-text">답변을 받을 이메일 주소를 입력해 주세요.</p>
          </div>

          <div class="form-group">
            <label for="phone">연락처</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="010-0000-0000"
            />
          </div>

          <div class="form-group">
            <label for="course">관심 과정 <span class="required">*</span></label>
            <select id="course" name="course" required>
              <option value="">선택하세요</option>
              <option value="html-css">HTML / CSS</option>
              <option value="javascript">JavaScript</option>
              <option value="react">React</option>
              <option value="frontend">프론트엔드 종합 과정</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">문의 내용 <span class="required">*</span></label>
            <textarea
              id="message"
              name="message"
              placeholder="궁금한 내용을 자세히 입력해 주세요"
              required
            ></textarea>
            <p class="help-text">
              예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등
            </p>
          </div>

          <div class="form-group checkbox-group">
            <input type="checkbox" id="agree" name="agree" required />
            <label for="agree">개인정보 수집 및 이용에 동의합니다. <span class="required">*</span></label>
          </div>

          <button type="submit" class="submit-btn">상담 문의 보내기</button>
        </fieldset>
      </form>
    </section>
  </main>
</body>
</html>
